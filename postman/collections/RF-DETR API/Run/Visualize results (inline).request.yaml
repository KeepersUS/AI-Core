$kind: http-request
url: "{{baseUrl}}/run"
method: POST
body:
  type: formdata
  content:
    - type: file
      key: image
      src:
        - "{{image}}"
    - type: file
      key: reference_json
      src:
        - "{{reference_json}}"
    - type: text
      key: use_gpu
      value: "{{use_gpu}}"
    - type: text
      key: create_overlay
      value: "true"
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP 200', function () {
        pm.expect(pm.response.code).to.be.oneOf([200]);
      });
      pm.test('comparison_results present', function () {
        const body = pm.response.json();
        pm.expect(body).to.have.property('comparison_results');
      });
    language: text/javascript
order: 2000
