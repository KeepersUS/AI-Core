$kind: http-request
url: "{{baseUrl}}/health"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP 200', function () {
        pm.expect(pm.response.code).to.equal(200);
      });
      pm.test('Status healthy', function () {
        const body = pm.response.json();
        pm.expect(body.status).to.equal('healthy');
      });
      pm.test('API version 2.0.0', function () {
        const body = pm.response.json();
        pm.expect(body.api_version).to.equal('2.0.0');
      });
    language: text/javascript
order: 1000
